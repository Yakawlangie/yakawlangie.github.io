<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <!-- Teal sphere gradient -->
    <radialGradient id="sphereG" cx="36%" cy="30%" r="68%">
      <stop offset="0%"   stop-color="#4FFFDF"/>
      <stop offset="40%"  stop-color="#00C9A7"/>
      <stop offset="100%" stop-color="#006B5C"/>
    </radialGradient>
    <!-- Glossy highlight -->
    <radialGradient id="glossG" cx="33%" cy="26%" r="42%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Sphere glow -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Dot glow -->
    <filter id="dotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sparkle dots (upper-left, matching your logo style) -->
  <g filter="url(#dotGlow)" fill="#4FFFDF" opacity="0.85">
    <circle cx="4"  cy="10" r="4.0"/>
    <circle cx="13" cy="3"  r="2.8"/>
    <circle cx="2"  cy="22" r="2.4"/>
    <circle cx="20" cy="7"  r="2.0"/>
    <circle cx="8"  cy="30" r="1.6"/>
    <circle cx="24" cy="16" r="1.4"/>
    <circle cx="3"  cy="38" r="1.1"/>
    <circle cx="16" cy="24" r="1.0"/>
    <circle cx="27" cy="26" r="0.8"/>
  </g>

  <!-- Sphere -->
  <circle cx="46" cy="28" r="24" fill="url(#sphereG)" filter="url(#glow)"/>
  <!-- Gloss -->
  <circle cx="46" cy="28" r="24" fill="url(#glossG)"/>

  <!-- "JS" text on sphere -->
  <text x="46" y="36"
    font-family="'Arial Black','Helvetica Neue',Arial,sans-serif"
    font-size="18" font-weight="900"
    fill="white" text-anchor="middle"
    letter-spacing="-0.5"
    style="paint-order:stroke;stroke:rgba(0,0,0,0.2);stroke-width:1.5px">JS</text>

  <!-- "Jawad Saber" name text -->
  <text x="82" y="26"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="15" font-weight="700"
    fill="#E8FFF9"
    letter-spacing="0.04em">JAWAD</text>
  <text x="82" y="44"
    font-family="'Helvetica Neue',Arial,sans-serif"
    font-size="15" font-weight="300"
    fill="#4FFFDF"
    letter-spacing="0.12em">SABER</text>
</svg>
